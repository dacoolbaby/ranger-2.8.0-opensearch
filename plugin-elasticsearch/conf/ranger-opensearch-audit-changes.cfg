# OpenSearch Audit Configuration
# Note: This module provides backward compatibility with Elasticsearch configuration keys.
# If opensearch.* keys are not set, the module will fall back to elasticsearch.* keys.

# OpenSearch configuration (new preferred keys)
xasecure.audit.destination.opensearch                                    %XAAUDIT.OPENSEARCH.ENABLE%                              mod create-if-not-exists
xasecure.audit.destination.opensearch.urls                               %XAAUDIT.OPENSEARCH.URL%                                 mod create-if-not-exists
xasecure.audit.destination.opensearch.user                               %XAAUDIT.OPENSEARCH.USER%                                mod create-if-not-exists
xasecure.audit.destination.opensearch.password                           %XAAUDIT.OPENSEARCH.PASSWORD%                            mod create-if-not-exists
xasecure.audit.destination.opensearch.index                              %XAAUDIT.OPENSEARCH.INDEX%                               mod create-if-not-exists
xasecure.audit.destination.opensearch.port                               %XAAUDIT.OPENSEARCH.PORT%                                mod create-if-not-exists
xasecure.audit.destination.opensearch.protocol                           %XAAUDIT.OPENSEARCH.PROTOCOL%                            mod create-if-not-exists

# Elasticsearch configuration (legacy keys, still supported for backward compatibility)
# These are already defined in ranger-elasticsearch-audit-changes.cfg
# The OpenSearch module will fall back to these if opensearch.* keys are not set
